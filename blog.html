<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BVV5SDM5P"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BVV5SDM5P');
  </script>

  <meta charset="UTF-8">
  <script>
  (function(){
    const l = localStorage.getItem('nph_lang') || 'ar';
    document.documentElement.setAttribute('lang', l);
    document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
  })();
  </script>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="مدونة NEO PULSE HUB — مراجعات شاملة وأدلة شراء لأفضل المنتجات التقنية">
  <meta name="keywords" content="مراجعات منتجات، أدلة شراء، أمازون، منتجات ذكية، تقنية">
  <link rel="canonical" href="https://neo-pulse-hub.it.com/blog.html">
  
  <title>المدونة | NEO PULSE HUB</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #3b82f6;
      --secondary: #7c3aed;
      --accent: #60a5fa;
      --success: #10b981;
      --warning: #f59e0b;
      --dark-bg: #020510;
      --card-bg: rgba(10, 13, 26, 0.8);
      --border-color: #3b82f6;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #0f172a 100%);
      color: var(--text-primary);
      line-height: 1.8;
      overflow-x: hidden;
    }

    /* Header */
    header {
      background: rgba(3, 7, 18, 0.95);
      border-bottom: 2px solid var(--primary);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      white-space: nowrap;
    }

    nav {
      display: flex;
      gap: 30px;
      align-items: center;
      flex: 1;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
      margin: 0;
    }

    .nav-links a {
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.3s;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .lang-toggle {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .lang-toggle:hover {
      background: var(--secondary);
      transform: scale(1.05);
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Page Title */
    .page-title {
      text-align: center;
      margin-bottom: 50px;
    }

    .page-title h1 {
      font-size: 2.5em;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 900;
    }

    .page-title p {
      color: var(--text-secondary);
      font-size: 1.1em;
    }

    /* Search & Filter */
    .search-filter {
      display: flex;
      gap: 15px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      padding: 12px 20px;
      border-radius: 25px;
      color: var(--text-primary);
      font-size: 1em;
    }

    .search-box::placeholder {
      color: var(--text-secondary);
    }

    .filter-btn {
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Articles Grid */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 50px;
    }

    .article-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 15px;
      overflow: hidden;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .article-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
    }

    .article-icon {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3em;
      color: white;
    }

    .article-content {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .article-title {
      font-size: 1.2em;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: bold;
      line-height: 1.4;
    }

    .article-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
      font-size: 0.9em;
      color: var(--text-secondary);
      margin-top: auto;
    }

    .article-link {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s;
      margin-top: 15px;
      text-align: center;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .article-link:hover {
      transform: scale(1.05);
    }

    /* Stats */
    .stats {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 15px;
      border: 1px solid var(--border-color);
    }

    .stats p {
      font-size: 1.1em;
      color: var(--accent);
      font-weight: bold;
    }

    /* Footer */
    footer {
      background: rgba(3, 7, 18, 0.95);
      border-top: 2px solid var(--primary);
      padding: 40px 20px;
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .page-title h1 {
        font-size: 1.8em;
      }

      .articles-grid {
        grid-template-columns: 1fr;
      }

      .header-container {
        flex-direction: column;
        gap: 15px;
      }

      nav {
        flex-direction: column;
        gap: 15px;
        width: 100%;
      }

      .nav-links {
        gap: 15px;
        flex-direction: column;
      }

      .search-filter {
        flex-direction: column;
      }

      .search-box {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-container">
      <a href="index.html" class="logo">🚀 NEO PULSE HUB</a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">الرئيسية</a></li>
          <li><a href="blog.html">المدونة</a></li>
          <li><a href="#about">عن المنصة</a></li>
        </ul>
        <button class="lang-toggle" onclick="toggleLanguage()">EN</button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <div class="container">
    <!-- Page Title -->
    <div class="page-title">
      <h1>📰 مدونة NEO PULSE HUB</h1>
      <p>مراجعات شاملة وأدلة شراء لأفضل المنتجات التقنية</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <p>📊 <span id="articleCount">40</span> مقالة | 📚 محتوى متنوع | ⭐ جودة عالية</p>
    </div>

    <!-- Search & Filter -->
    <div class="search-filter">
      <input type="text" class="search-box" id="searchBox" placeholder="ابحث عن مقالة...">
      <button class="filter-btn active" onclick="filterArticles('all')">جميع المقالات</button>
      <button class="filter-btn" onclick="filterArticles('smartwatch')">ساعات ذكية</button>
      <button class="filter-btn" onclick="filterArticles('earbuds')">سماعات</button>
      <button class="filter-btn" onclick="filterArticles('smart-home')">منزل ذكي</button>
    </div>

    <!-- Articles Grid -->
    <div class="articles-grid" id="articlesContainer">
      <!-- سيتم ملء هذا القسم بـ JavaScript -->
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 NEO PULSE HUB. جميع الحقوق محفوظة.</p>
    <p>تحديث آخر: 29 أبريل 2026 | <strong>40 مقالة احترافية</strong></p>
  </footer>

  <script>
    // بيانات المقالات من JSON
    let allArticles = [];
    let currentLanguage = 'ar';

    // تحميل بيانات المقالات
    async function loadArticles() {
      try {
        const response = await fetch('articles_data.json');
        const data = await response.json();
        
        // تحويل البيانات إلى صيغة موحدة
        allArticles = [];
        
        // إضافة المقالات العربية
        data.ar.forEach(article => {
          allArticles.push({
            title: article.title,
            path: article.path,
            lang: 'ar',
            icon: getIconForArticle(article.title),
            category: getCategoryForArticle(article.title)
          });
        });

        // إضافة المقالات الإنجليزية
        data.en.forEach(article => {
          allArticles.push({
            title: article.title,
            path: article.path,
            lang: 'en',
            icon: getIconForArticle(article.title),
            category: getCategoryForArticle(article.title)
          });
        });

        displayArticles(allArticles);
      } catch (error) {
        console.error('خطأ في تحميل المقالات:', error);
        // عرض رسالة خطأ
        document.getElementById('articlesContainer').innerHTML = '<p>خطأ في تحميل المقالات</p>';
      }
    }

    // الحصول على أيقونة المقالة
    function getIconForArticle(title) {
      const icons = {
        'watch': '⌚', 'ساعة': '⌚', 'smartwatch': '⌚',
        'earbuds': '🎧', 'سماعات': '🎧', 'headphones': '🎧',
        'smart': '🏠', 'منزل': '🏠', 'home': '🏠',
        'glasses': '👓', 'نظارات': '👓',
        'ring': '💍', 'خاتم': '💍',
        'tracker': '📍', 'متتبع': '📍',
        'plug': '🔌', 'مقبس': '🔌',
        'thermostat': '🌡️', 'حرارة': '🌡️',
        'light': '💡', 'إضاءة': '💡',
        'band': '⌚', 'سوار': '⌚'
      };

      for (let [key, icon] of Object.entries(icons)) {
        if (title.toLowerCase().includes(key)) {
          return icon;
        }
      }
      return '📱';
    }

    // الحصول على فئة المقالة
    function getCategoryForArticle(title) {
      const categories = {
        'watch': 'smartwatch', 'ساعة': 'smartwatch', 'smartwatch': 'smartwatch',
        'earbuds': 'earbuds', 'سماعات': 'earbuds', 'headphones': 'earbuds',
        'smart': 'smart-home', 'منزل': 'smart-home', 'home': 'smart-home',
        'glasses': 'wearable', 'نظارات': 'wearable',
        'ring': 'wearable', 'خاتم': 'wearable',
        'tracker': 'wearable', 'متتبع': 'wearable',
        'plug': 'smart-home', 'مقبس': 'smart-home',
        'thermostat': 'smart-home', 'حرارة': 'smart-home',
        'light': 'smart-home', 'إضاءة': 'smart-home',
        'band': 'smartwatch', 'سوار': 'smartwatch'
      };

      for (let [key, category] of Object.entries(categories)) {
        if (title.toLowerCase().includes(key)) {
          return category;
        }
      }
      return 'other';
    }

    // عرض المقالات
    function displayArticles(articlesToShow) {
      const container = document.getElementById('articlesContainer');
      
      if (articlesToShow.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary);">لم يتم العثور على مقالات</p>';
        return;
      }

      container.innerHTML = '';
      
      articlesToShow.forEach(article => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.innerHTML = `
          <div class="article-icon">${article.icon}</div>
          <div class="article-content">
            <h3 class="article-title">${article.title}</h3>
            <div class="article-meta">
              <span>📅 29 أبريل 2026</span>
              <span>⭐ 4.5/5</span>
            </div>
            <a href="${article.path}" class="article-link">اقرأ المقالة →</a>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // تصفية المقالات
    function filterArticles(category) {
      // تحديث الأزرار النشطة
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      // تصفية المقالات
      if (category === 'all') {
        displayArticles(allArticles);
      } else {
        const filtered = allArticles.filter(a => a.category === category);
        displayArticles(filtered);
      }
    }

    // البحث عن المقالات
    document.addEventListener('DOMContentLoaded', function() {
      const searchBox = document.getElementById('searchBox');
      if (searchBox) {
        searchBox.addEventListener('input', function(e) {
          const query = e.target.value.toLowerCase();
          const filtered = allArticles.filter(a => 
            a.title.toLowerCase().includes(query)
          );
          displayArticles(filtered);
        });
      }
    });

    // تبديل اللغة
    function toggleLanguage() {
      currentLanguage = currentLanguage === 'ar' ? 'en' : 'ar';
      localStorage.setItem('nph_lang', currentLanguage);
      
      if (currentLanguage === 'en') {
        document.documentElement.setAttribute('lang', 'en');
        document.documentElement.setAttribute('dir', 'ltr');
        document.querySelector('.lang-toggle').textContent = 'AR';
        document.querySelector('.page-title h1').textContent = '📰 NEO PULSE HUB Blog';
        document.querySelector('.page-title p').textContent = 'Comprehensive reviews and buying guides for the best tech products';
        document.querySelector('.search-box').placeholder = 'Search for an article...';
        document.querySelector('footer p:first-child').textContent = '© 2026 NEO PULSE HUB. All rights reserved.';
      } else {
        document.documentElement.setAttribute('lang', 'ar');
        document.documentElement.setAttribute('dir', 'rtl');
        document.querySelector('.lang-toggle').textContent = 'EN';
        document.querySelector('.page-title h1').textContent = '📰 مدونة NEO PULSE HUB';
        document.querySelector('.page-title p').textContent = 'مراجعات شاملة وأدلة شراء لأفضل المنتجات التقنية';
        document.querySelector('.search-box').placeholder = 'ابحث عن مقالة...';
        document.querySelector('footer p:first-child').textContent = '© 2026 NEO PULSE HUB. جميع الحقوق محفوظة.';
      }
    }

    // تحميل المقالات عند تحميل الصفحة
    window.addEventListener('load', loadArticles);
  </script>
</body>
</html>
