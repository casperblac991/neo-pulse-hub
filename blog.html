<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BVV5SDM5P"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BVV5SDM5P');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="مدونة NEO PULSE HUB — مراجعات شاملة وأدلة شراء لأفضل المنتجات التقنية">
  <meta name="keywords" content="مراجعات منتجات، أدلة شراء، أمازون، منتجات ذكية">
  <title>المدونة | NEO PULSE HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020510;
      --surface: #0a0d1a;
      --border: rgba(99, 179, 237, 0.12);
      --blue: #3b82f6;
      --purple: #7c3aed;
      --cyan: #22d3ee;
      --gold: #f59e0b;
      --text: #e2e8f0;
      --muted: rgba(226, 232, 240, 0.55);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.6;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2.5rem;
      gap: 1rem;
      background: rgba(2, 5, 16, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--cyan), #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.85rem;
      color: var(--muted);
      padding: 0.35rem 0.8rem;
      border-radius: 50px;
      transition: color 0.3s;
      text-decoration: none;
    }

    .nav-links a:hover {
      color: var(--cyan);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-title {
      text-align: center;
      margin: 3rem 0;
    }

    .page-title h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-title p {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .category-section {
      margin: 4rem 0;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    .category-icon {
      font-size: 2rem;
    }

    .category-title {
      font-size: 1.5rem;
      color: var(--cyan);
      font-weight: 700;
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .article-card:hover {
      border-color: var(--blue);
      background: rgba(59, 130, 246, 0.05);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.1);
    }

    .article-title {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-weight: 600;
      line-height: 1.4;
      flex-grow: 1;
    }

    .article-meta {
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .article-link {
      display: inline-block;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s;
      margin-top: 1rem;
      text-align: center;
    }

    .article-link:hover {
      transform: scale(1.05);
    }

    footer {
      background: rgba(2, 5, 16, 0.9);
      border-top: 1px solid var(--border);
      padding: 2rem;
      margin-top: 4rem;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      nav {
        padding: 0.9rem 1rem;
        flex-direction: column;
      }

      .nav-links {
        gap: 1rem;
      }

      .page-title h1 {
        font-size: 1.8rem;
      }

      .articles-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">🚀 NEO PULSE HUB</div>
    <ul class="nav-links">
      <li><a href="index.html">الرئيسية</a></li>
      <li><a href="blog.html">المدونة</a></li>
      <li><a href="#contact">تواصل</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="page-title">
      <h1>📰 مدونة NEO PULSE HUB</h1>
      <p>مراجعات شاملة وأدلة شراء لأفضل المنتجات التقنية</p>
    </div>

    <div id="categoriesContainer"></div>
  </div>

  <footer>
    <p>&copy; 2026 NEO PULSE HUB. جميع الحقوق محفوظة.</p>
    <p>تحديث آخر: 30 أبريل 2026 | <strong>40 مقالة احترافية</strong></p>
  </footer>

  <script>
    const categoryIcons = {
      'ساعات ذكية': '⌚',
      'سماعات': '🎧',
      'منزل ذكي': '🏠',
      'نظارات ذكية': '👓',
      'صحة ذكية': '❤️',
      'أدلة ومقالات': '📚',
      'أخرى': '📱',
      'Smartwatches': '⌚',
      'Earbuds': '🎧',
      'Smart Home': '🏠',
      'Smart Glasses': '👓',
      'Smart Health': '❤️',
      'Guides & Articles': '📚',
      'Other': '📱'
    };

    async function loadAndDisplayArticles() {
      try {
        const response = await fetch('all_articles.json');
        const articles = await response.json();

        // تجميع المقالات حسب الفئة
        const grouped = {};
        articles.forEach(article => {
          if (!grouped[article.category]) {
            grouped[article.category] = [];
          }
          grouped[article.category].push(article);
        });

        // ترتيب الفئات
        const categoryOrder = ['ساعات ذكية', 'سماعات', 'منزل ذكي', 'نظارات ذكية', 'صحة ذكية', 'أدلة ومقالات', 'أخرى'];
        
        let html = '';
        
        categoryOrder.forEach(category => {
          if (grouped[category]) {
            const icon = categoryIcons[category] || '📱';
            html += `
              <div class="category-section">
                <div class="category-header">
                  <span class="category-icon">${icon}</span>
                  <h2 class="category-title">${category}</h2>
                </div>
                <div class="articles-grid">
            `;

            grouped[category].forEach(article => {
              html += `
                <div class="article-card">
                  <h3 class="article-title">${article.title}</h3>
                  <div class="article-meta">
                    <span>📅 30 أبريل 2026</span>
                    <span>⭐ 4.5/5</span>
                  </div>
                  <a href="${article.path}" class="article-link">اقرأ المقالة →</a>
                </div>
              `;
            });

            html += `
                </div>
              </div>
            `;
          }
        });

        document.getElementById('categoriesContainer').innerHTML = html;
      } catch (error) {
        console.error('خطأ في تحميل المقالات:', error);
        document.getElementById('categoriesContainer').innerHTML = '<p>خطأ في تحميل المقالات</p>';
      }
    }

    window.addEventListener('load', loadAndDisplayArticles);
  </script>
</body>
</html>
