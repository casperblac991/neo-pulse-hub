    <style>
        /* === تصميم الموقع (CSS) === */
        :root {
            --bg: #020510;
            --surface: #0a0d1a;
            --border: rgba(99, 179, 237, 0.15);
            --primary: #3b82f6;
            --accent: #22d3ee;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --gold: #f59e0b;
            --font-main: 'Cairo', sans-serif;
            --font-head: 'Orbitron', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* القائمة العلوية */
        nav {
            background: rgba(2, 5, 16, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo { 
            font-family: var(--font-head); 
            background: linear-gradient(135deg, #60a5fa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700; 
            text-decoration: none; 
            font-size: 1.1rem;
        }
        
        /* تبديل اللغة */
        .lang-switch { display: flex; gap: 10px; }
        .lang-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text);
            padding: 5px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-family: var(--font-main);
        }
        .lang-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

        /* المحتوى الرئيسي */
        .container { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem; }
        
        h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .meta { text-align: center; color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem; }
        .intro { text-align: center; font-size: 1.1rem; max-width: 700px; margin: 0 auto 3rem; color: #cbd5e1; }

        /* كرت المنتج */
        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            transition: transform 0.3s, border-color 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .product-img {
            width: 120px; height: 120px; border-radius: 12px; object-fit: cover;
            background: #1e293b; flex-shrink: 0;
        }
        
        .product-info { flex: 1; }
        .product-name { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        .product-desc { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.8rem; line-height: 1.5; }
        
        .product-meta { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .rating { color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        .price { color: var(--accent); font-family: var(--font-head); font-weight: 700; font-size: 1.2rem; }
        
        .btn-buy {
            display: inline-block;
            background: linear-gradient(135deg, #ff9900, #e47911);
            color: white;
            padding: 6px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,153,0,0.4); }
        
        /* التوصية النهائية */
        .verdict {
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(6,182,212,0.1));
            border: 1px solid var(--border);
            border-radius: 20px; padding: 2.5rem; text-align: center; margin: 3rem 0;
        }
        .verdict h2 { color: #fff; margin-bottom: 1rem; }
        .verdict p { color: var(--muted); margin-bottom: 1.5rem; }

        .btn {
            display: inline-block; background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none;
            font-weight: bold; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(59,130,246,0.4); }

        @media (max-width: 768px) {
            .product-card { flex-direction: column; text-align: center; padding: 1rem; }
            .product-meta { justify-content: center; }
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>

    <div class="container">

            en: {

                products: [
                    {

                    },
                    {

                        price: "$179",

                        amazonLink: "https://www.amazon.com/dp/B0C4BWMD4F?tag=neopulsehub-20"

                    {

                        desc: "Best value for money. Good performance, week-long battery, very affordable.",
                        price: "$79",
                        rating: "4.6",
                        img: "https://images.unsplash.com/photo-1594882645560-3e93f0b74e31?w=300&q=80",
                        amazonLink: "https://www.amazon.com/dp/B0CG4H4Y4T?tag=neopulsehub-20"
                    }
                ]
            }
        };

        let currentLang = 'ar';

        function setLanguage(lang) {
            currentLang = lang;
            const content = data[lang];
            
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(lang === 'ar' ? 'العربية' : 'English'));
            });

            document.getElementById('page-title').textContent = content.title;
            document.getElementById('page-meta').textContent = content.meta;
            document.getElementById('page-intro').textContent = content.intro;
            document.getElementById('verdict-title').textContent = content.verdictTitle;
            document.getElementById('verdict-text').textContent = content.verdictText;
            document.getElementById('verdict-btn').textContent = content.verdictBtn;

            renderProducts(content.products);
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            products.forEach((product, index) => {
                const fullStars = Math.floor(product.rating);
                const halfStar = product.rating % 1 !== 0 ? '½' : '';
                const stars = '★'.repeat(fullStars) + halfStar + '☆'.repeat(5 - fullStars - (halfStar ? 1 : 0));

                const card = document.createElement('div');
                card.className = 'product-card';
                card.style.animation = `fadeUp 0.5s ease forwards ${index * 0.1}s`;
                card.style.opacity = '0';

                card.innerHTML = `
                    <img src="${product.img}" alt="${product.name}" class="product-img" loading="lazy">
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-desc">${product.desc}</div>
                        <div class="product-meta">
                            <span class="rating">${stars} ${product.rating}</span>
                            <span class="price">${product.price}</span>
                        </div>
                        <a href="${product.amazonLink}" target="_blank" class="btn-buy" rel="sponsored nofollow">🛒 شراء من أمازون</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            setLanguage(currentLang);
        });
    </script>
</body>
</html>
