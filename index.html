<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEO PULSE HUB</title>
  <style>
    body { font-family: Arial; background: #020510; color: white; text-align: center; padding: 20px; }
    .product { background: #0a0d1a; padding: 15px; margin: 10px; border-radius: 10px; }
    img { width: 100%; max-width: 200px; height: auto; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>NEO PULSE HUB</h1>
  <div id="products" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div>

  <script>
    async function loadProducts() {
      try {
        // جلب المنتجات من CJ API
        const response = await fetch('https://developers.cjdropshipping.com/api2.0/v1/product/list', {
          headers: {
            'CJ-Access-Token': '65ed5a163cb443958148ddb8cd07b02a',
            'Email': 'CJ5247816@api'
          }
        });
        
        const data = await response.json();
        console.log('المنتجات:', data);
        
        // عرض المنتجات في الصفحة
        const container = document.getElementById('products');
        
        if (data && data.data && data.data.length > 0) {
          container.innerHTML = data.data.slice(0, 10).map(product => `
            <div class="product">
              <img src="${product.imageUrl || product.mainImage || 'https://via.placeholder.com/200'}" onerror="this.src='https://via.placeholder.com/200'">
              <h3>${product.name || 'منتج'}</h3>
              <p>السعر: $${product.salePrice || '99'}</p>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<p>لا توجد منتجات حالياً</p>';
        }
      } catch (error) {
        console.error('خطأ:', error);
        document.getElementById('products').innerHTML = '<p>فشل تحميل المنتجات</p>';
      }
    }
    
    // تشغيل الدالة
    loadProducts();
  </script>
</body>
</html>
