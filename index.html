<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEO PULSE HUB</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cairo', Arial, sans-serif;
      background: #020510;
      color: white;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      margin: 30px 0;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #60a5fa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .product-card {
      background: #0a0d1a;
      border: 1px solid rgba(99,179,237,.12);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s;
    }
    
    .product-card:hover {
      transform: translateY(-5px);
      border-color: rgba(99,179,237,.25);
    }
    
    .product-img {
      height: 200px;
      overflow: hidden;
      background: #0f1423;
    }
    
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .product-body {
      padding: 15px;
    }
    
    .product-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .product-price {
      font-size: 1.3rem;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 5px;
    }
    
    .product-original {
      font-size: 0.9rem;
      color: rgba(226,232,240,.55);
      text-decoration: line-through;
    }
    
    .loading {
      text-align: center;
      padding: 50px;
      color: #60a5fa;
    }
    
    .error {
      text-align: center;
      padding: 50px;
      color: #ef4444;
    }
  </style>
</head>
<body>
  <h1>NEO PULSE HUB</h1>
  <div class="products-grid" id="productsGrid">
    <div class="loading">جاري تحميل المنتجات...</div>
  </div>

  <script>
    async function loadProducts() {
      try {
        console.log('جاري تحميل المنتجات...');
        
        // استخدام CORS proxy
        const proxyUrl = 'https://api.allorigins.win/raw?url=';
        const apiUrl = 'https://developers.cjdropshipping.com/api2.0/v1/product/list';
        
        const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
          headers: {
            'CJ-Access-Token': '65ed5a163cb443958148ddb8cd07b02a',
            'Email': 'CJ5247816@api'
          }
        });
        
        if (!response.ok) {
          throw new Error('فشل الاتصال');
        }
        
        const text = await response.text();
        console.log('الاستجابة:', text);
        
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          console.error('الاستجابة ليست JSON:', text);
          throw new Error('استجابة غير صالحة');
        }
        
        console.log('البيانات:', data);
        
        const container = document.getElementById('productsGrid');
        
        if (data && data.data && data.data.length > 0) {
          container.innerHTML = data.data.slice(0, 12).map(product => `
            <div class="product-card">
              <div class="product-img">
                <img src="${product.imageUrl || product.mainImage || 'https://via.placeholder.com/300'}" 
                     onerror="this.src='https://via.placeholder.com/300'">
              </div>
              <div class="product-body">
                <div class="product-name">${product.name || 'منتج ذكي'}</div>
                <div class="product-price">$${product.salePrice || '99'}</div>
                ${product.originalPrice ? `<div class="product-original">$${product.originalPrice}</div>` : ''}
              </div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="error">لا توجد منتجات حالياً</div>';
        }
      } catch (error) {
        console.error('خطأ:', error);
        document.getElementById('productsGrid').innerHTML = '<div class="error">فشل تحميل المنتجات</div>';
      }
    }
    
    // تشغيل الدالة
    loadProducts();
  </script>
</body>
</html>
