*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.7}

.bg-grid{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:60px 60px}

.nav-logo{font-family:'Orbitron',sans-serif;font-size:1.05rem;font-weight:700;background:linear-gradient(135deg,var(--blue2),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;align-items:center;gap:.2rem;list-style:none}
.nav-links a{font-size:.85rem;font-weight:500;color:var(--muted);padding:.35rem .8rem;border-radius:var(--rp);transition:color var(--ease),background var(--ease)}
.nav-links a:hover,.nav-links a.active{color:var(--cyan2);background:rgba(6,182,212,.08)}
.nav-cart{display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;color:var(--text);background:rgba(59,130,246,.1);border:1px solid var(--border2);border-radius:var(--rp);padding:.4rem 1rem;transition:all var(--ease);position:relative}

.cart-count{position:absolute;top:-6px;right:-6px;background:var(--purple);color:#fff;font-size:.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center}

.mobile-drawer{display:none;position:fixed;top:61px;inset:0;z-index:199;background:rgba(2,5,16,.97);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem;opacity:0;pointer-events:none;transition:opacity var(--ease)}
.mobile-drawer.open{display:flex!important;opacity:1;pointer-events:all}
.mobile-drawer a{font-size:1.3rem;font-weight:700;color:var(--muted);transition:color var(--ease)}
.mobile-drawer a:hover{color:var(--cyan2)}

.page-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.5rem,4vw,2.5rem);font-weight:700;background:linear-gradient(135deg,#fff,var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}

.catalog-layout{max-width:1300px;margin:0 auto;padding:0 1.5rem 5rem;display:grid;grid-template-columns:260px 1fr;gap:2rem}

.results-count{font-size:.85rem;color:var(--muted);white-space:nowrap}

.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:all var(--ease);cursor:pointer;position:relative;animation:fadeIn .4s ease both}

.product-card:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:0 16px 32px rgba(0,0,0,.4),0 0 20px rgba(59,130,246,.15)}

.product-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}

function loadProducts() {
  try {
    allProducts = INLINE_PRODUCTS.map(p => ({
      ...p,
      name_ar: p.name_ar,
      name_en: p.name_en,
      category_ar: p.category_ar,
      category_en: p.category_en,
      badge_ar: p.badge_ar,
      badge_en: p.badge_en,
      in_stock: true
    }));
    
    console.log('✅ تم تحميل', allProducts.length, 'منتج محلي');
    
    // تحديث أعداد الفئات
    document.getElementById('count-all').textContent = allProducts.length;
    document.getElementById('count-smartwatch').textContent = allProducts.filter(p => p.category === 'smartwatch').length;
    document.getElementById('count-smart-glasses').textContent = allProducts.filter(p => p.category === 'smart-glasses').length;
    document.getElementById('count-health').textContent = allProducts.filter(p => p.category === 'health').length;
    document.getElementById('count-smart-home').textContent = allProducts.filter(p => p.category === 'smart-home').length;
    document.getElementById('count-earbuds').textContent = allProducts.filter(p => p.category === 'earbuds').length;
    document.getElementById('count-productivity').textContent = allProducts.filter(p => p.category === 'productivity').length;
    
    // تطبيق الفلتر الأول
    applyFilters();
    
  } catch(e) {
    console.error('❌ خطأ في تحميل المنتجات:', e);
    allProducts = [];
  }
}

// ============================================
// تطبيق الفلاتر والبحث
// ============================================
function applyFilters() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  
  filteredProducts = allProducts.filter(p => {
    const matchCat = activeCategory === 'all' || p.category === activeCategory;
    const matchPrice = p.price <= maxPrice;
    const name = lang === 'en' ? (p.name_en || '').toLowerCase() : (p.name_ar || '').toLowerCase();
    const matchQ = !q || name.includes(q);
    return matchCat && matchPrice && matchQ;
  });

  // تطبيق الترتيب
  if (sortBy === 'price-asc') filteredProducts.sort((a,b) => a.price - b.price);
  if (sortBy === 'price-desc') filteredProducts.sort((a,b) => b.price - a.price);
  if (sortBy === 'rating') filteredProducts.sort((a,b) => b.rating - a.rating);
  if (sortBy === 'discount') filteredProducts.sort((a,b) => b.discount - a.discount);

  renderProducts();
  
  const ui = lang === 'en' ? { results_suffix: 'products' } : { results_suffix: 'منتج' };
  document.getElementById('resultsCount').textContent = `${filteredProducts.length} ${ui.results_suffix}`;
}

// ============================================
// عرض المنتجات
// ============================================
function renderProducts() {
  const grid = document.getElementById('productsGrid');
  if (!grid) return;
  
  if (filteredProducts.length === 0) {
    const noResultsText = lang === 'en' ? 'No products match your search' : 'لا توجد منتجات مطابقة للبحث';
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><div class="icon">🔍</div><p>${noResultsText}</p></div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }
  
  // عرض أول 20 منتج فقط (باقي المنتجات عند الضغط على "عرض المزيد")
  const page = window._productsPage || 1;
  const perPage = 20;
  const visible = filteredProducts.slice(0, page * perPage);
  
  grid.innerHTML = visible.map((p, i) => {
    const inCart = cart.some(c => c.id === p.id);
    const name = lang === 'en' ? (p.name_en || p.name_ar) : p.name_ar;
    const category = lang === 'en' ? (p.category_en || p.category_ar) : p.category_ar;
    const badge = lang === 'en' ? (p.badge_en || p.badge_ar) : p.badge_ar;
    const addBtnText = inCart ? '✓' : (lang === 'en' ? '+' : '+');
    const outOfStockText = lang === 'en' ? 'Out of Stock' : 'نفد المخزون';
    
    return `
    <div class="product-card" style="animation-delay:${i*0.04}s" onclick="goProduct('${p.id}')">
      <div class="product-img">
        <img src="${p.image}" alt="${name}" loading="lazy" onerror="this.onerror=null;this.src='https://placehold.co/400x400/1e3a5f/ffffff?text='+encodeURIComponent('${name}')">
        ${badge ? `<span class="badge">${badge}</span>` : ''}
        ${p.discount ? `<span class="discount-tag">-${p.discount}%</span>` : ''}
        ${!p.in_stock ? `<div class="out-of-stock"><span>${outOfStockText}</span></div>` : ''}
      </div>
      <div class="product-body">
        <div class="product-cat">${category || ''}</div>
        <div class="product-name">${name}</div>
        <div class="stars-row">
          <span class="stars">${'★'.repeat(Math.floor(p.rating || 4))}</span>
          <span class="rev">${p.rating} (${p.reviews || 0})</span>
        </div>
        <div class="price-row">
          <div>
            <div class="price">$${p.price}</div>
            ${p.original_price ? `<div class="orig">$${p.original_price}</div>` : ''}
          </div>
          <button class="cart-btn ${inCart ? 'added' : ''}" onclick="event.stopPropagation();addToCart('${p.id}')">${addBtnText}</button>
        </div>
      </div>
    </div>`;
  }).join('');
  
  // زر "عرض المزيد"
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  if (visible.length < filteredProducts.length) {
    const loadMoreText = lang === 'en' ? 'Load More' : 'عرض المزيد';
    loadMoreBtn.innerHTML = `<button onclick="loadMoreProducts()" style="background:linear-gradient(135deg,var(--blue),var(--purple));color:white;border:none;padding:.8rem 2.5rem;border-radius:50px;font-size:1rem;cursor:pointer;font-weight:700">${loadMoreText} (${filteredProducts.length - visible.length})</button>`;
    loadMoreBtn.style.display = 'block';
  } else {
    loadMoreBtn.style.display = 'none';
  }
}

// ============================================
// تحميل المزيد من المنتجات
// ============================================
function loadMoreProducts() {
  window._productsPage = (window._productsPage || 1) + 1;
  renderProducts();
}

// ============================================
// تعيين الفئة النشطة
// ============================================
function setFilter(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.sidebar .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// ============================================
// ترتيب المنتجات
// ============================================
function sortProducts(by, btn) {
  sortBy = by;
  document.querySelectorAll('.sidebar-card:last-child .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// ============================================
// تصفية حسب السعر
// ============================================
function filterByPrice(val) {
  maxPrice = parseInt(val);
  document.getElementById('priceLabel').textContent = '$' + val;
  applyFilters();
}

// ============================================
// إضافة إلى السلة
// ============================================
function addToCart(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  
  const ex = cart.find(c => c.id === id);
  if (ex) {
    ex.qty = (ex.qty || 1) + 1;
  } else {
    cart.push({...p, qty: 1});
  }
  
  localStorage.setItem('nph_cart', JSON.stringify(cart));
  updateCartUI();
  renderProducts();
  
  const name = lang === 'en' ? (p.name_en || p.name_ar) : p.name_ar;
  const toastText = lang === 'en' ? 'Added to cart' : 'أُضيف للسلة';
  showToast('✅', `${name} — ${toastText}`);
}

// ============================================
// تحديث واجهة السلة
// ============================================
function updateCartUI() {
  const total = cart.reduce((s, i) => s + (i.qty || 1), 0);
  const badge = document.getElementById('cartCount');
  if (badge) {
    badge.textContent = total;
    badge.style.display = total > 0 ? 'flex' : 'none';
  }
}

// ============================================
// فتح السلة
// ============================================
function openCart() {
  if (!cart.length) {
    const emptyText = lang === 'en' ? 'Your cart is empty!' : 'سلتك فارغة!';
    showToast('🛒', emptyText);
    return;
  }
  
  const items = cart.map(i => {
    const name = lang === 'en' ? (i.name_en || i.name_ar) : i.name_ar;
    return `• ${name} x${i.qty || 1} = $${(i.price * (i.qty || 1)).toFixed(2)}`;
  }).join('\n');
  
  const total = cart.reduce((s, i) => s + i.price * (i.qty || 1), 0);
  const cartTitle = lang === 'en' ? 'Cart' : 'السلة';
  const totalText = lang === 'en' ? 'Total' : 'الإجمالي';
  
  alert(`${cartTitle}:\n\n${items}\n\n💰 ${totalText}: $${total.toFixed(2)}`);
}

// ============================================
// الذهاب لصفحة المنتج
// ============================================
function goProduct(id) {
  window.location.href = `product-detail.html?id=${id}`;
}

// ============================================
// عرض رسالة Toast
// ============================================
let toastTimer;
function showToast(icon, text) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon + ' ';
  document.getElementById('toastText').textContent = text;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ============================================
// قائمة الهاتف
// ============================================
function toggleMenu() {
  const h = document.getElementById('hamburger');
  const d = document.getElementById('mobileDrawer');
  h.classList.toggle('open');
  d.classList.toggle('open');
  document.body.style.overflow = d.classList.contains('open') ? 'hidden' : '';
}

function closeMenu() {
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('mobileDrawer').classList.remove('open');
  document.body.style.overflow = '';
}

// ============================================
// تهيئة الصفحة
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  // قراءة اللغة من URL
  const urlParams = new URLSearchParams(window.location.search);
  const urlLang = urlParams.get('lang');
  if (urlLang === 'ar' || urlLang === 'en') {
    lang = urlLang;
    localStorage.setItem('nph_lang', lang);
  }
  
  // تحميل المنتجات
  loadProducts();
  
  // تطبيق اللغة
  changeLang(lang);
  
  // تحديث السلة
  updateCartUI();
  
  // قراءة معامل الفئة من URL
  if (urlParams.get('cat')) {
    const cat = urlParams.get('cat');
    const catBtn = document.querySelector(`.filter-btn[onclick*="'${cat}'"]`);
    if (catBtn) {
      setFilter(cat, catBtn);
    }
  }
  
  // إغلاق القائمة عند النقر خارجها
  document.addEventListener('click', (e) => {
    const drawer = document.getElementById('mobileDrawer');
    const hamburger = document.getElementById('hamburger');
    if (drawer.classList.contains('open') && !drawer.contains(e.target) && !hamburger.contains(e.target)) {
      closeMenu();
    }
  });
});
</script>
