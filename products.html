<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المنتجات | NEO PULSE HUB</title>
  <meta name="description" content="تسوق أحدث منتجات الذكاء الاصطناعي — ساعات ذكية، نظارات AR، أجهزة صحة، منزل ذكي.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
:root{--bg:#020510;--surface:#0a0d1a;--surface2:#0f1423;--border:rgba(99,179,237,.12);--border2:rgba(99,179,237,.25);--blue:#3b82f6;--blue2:#60a5fa;--purple:#7c3aed;--purple2:#a855f7;--cyan:#06b6d4;--cyan2:#22d3ee;--green:#10b981;--red:#ef4444;--gold:#f59e0b;--text:#e2e8f0;--muted:rgba(226,232,240,.55);--r:12px;--r2:20px;--rp:50px;--ease:.3s cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.7}
a{color:inherit;text-decoration:none}button{cursor:pointer;border:none;background:none;font-family:inherit}
.bg-grid{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:60px 60px}
.bg-grad{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(124,58,237,.1),transparent 60%),radial-gradient(ellipse 50% 40% at 90% 80%,rgba(6,182,212,.07),transparent 60%)}
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2.5rem;gap:1rem;background:rgba(2,5,16,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Orbitron',sans-serif;font-size:1.05rem;font-weight:700;background:linear-gradient(135deg,var(--blue2),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;align-items:center;gap:.2rem;list-style:none}
.nav-links a{font-size:.85rem;font-weight:500;color:var(--muted);padding:.35rem .8rem;border-radius:var(--rp);transition:color var(--ease),background var(--ease)}
.nav-links a:hover,.nav-links a.active{color:var(--cyan2);background:rgba(6,182,212,.08)}
.nav-cart{display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;color:var(--text);background:rgba(59,130,246,.1);border:1px solid var(--border2);border-radius:var(--rp);padding:.4rem 1rem;transition:all var(--ease);position:relative}
.nav-cart:hover{background:rgba(59,130,246,.2);color:var(--blue2)}
.cart-count{position:absolute;top:-6px;right:-6px;background:var(--purple);color:#fff;font-size:.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center}
.hamburger{display:none;flex-direction:column;gap:5px;padding:6px;background:rgba(59,130,246,.08);border:1px solid var(--border);border-radius:8px}
.hamburger span{display:block;width:20px;height:2px;background:var(--blue2);border-radius:2px;transition:all var(--ease)}
.mobile-drawer{display:none;position:fixed;top:61px;inset:0;z-index:199;background:rgba(2,5,16,.97);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem;opacity:0;pointer-events:none;transition:opacity var(--ease)}
.mobile-drawer.open{display:flex!important;opacity:1;pointer-events:all}
.mobile-drawer a{font-size:1.3rem;font-weight:700;color:var(--muted);transition:color var(--ease)}
.mobile-drawer a:hover{color:var(--cyan2)}
.page-header{padding:5rem 2rem 2.5rem;text-align:center}
.page-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.5rem,4vw,2.5rem);font-weight:700;background:linear-gradient(135deg,#fff,var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.page-sub{color:var(--muted);font-size:.95rem}
.catalog-layout{max-width:1300px;margin:0 auto;padding:0 1.5rem 5rem;display:grid;grid-template-columns:260px 1fr;gap:2rem}
/* Sidebar */
.sidebar{position:sticky;top:80px;height:fit-content}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;margin-bottom:1rem}
.sidebar-title{font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--blue2);margin-bottom:1rem}
.filter-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:.6rem .9rem;border-radius:var(--r);font-size:.88rem;font-weight:500;color:var(--muted);background:transparent;border:1px solid transparent;transition:all var(--ease);margin-bottom:.3rem;font-family:'Cairo',sans-serif;cursor:pointer}
.filter-btn:hover,.filter-btn.active{background:rgba(59,130,246,.1);border-color:var(--border2);color:var(--blue2)}
.filter-btn.active{color:var(--cyan2)}
.filter-count{font-size:.72rem;background:rgba(59,130,246,.15);color:var(--blue2);padding:.1rem .5rem;border-radius:var(--rp)}
.price-range{width:100%;margin:.5rem 0}
.price-labels{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-top:.3rem}
/* Main */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--rp);padding:.7rem 1.2rem .7rem 2.8rem;font-size:.9rem;font-family:'Cairo',sans-serif;outline:none;transition:border-color var(--ease)}
.search-input:focus{border-color:var(--blue2)}
.search-icon{position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.sort-select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--rp);padding:.7rem 1.2rem;font-size:.85rem;font-family:'Cairo',sans-serif;outline:none;cursor:pointer}
.results-count{font-size:.85rem;color:var(--muted);white-space:nowrap}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.3rem}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:all var(--ease);cursor:pointer;position:relative;animation:fadeIn .4s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.product-card:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:0 16px 32px rgba(0,0,0,.4),0 0 20px rgba(59,130,246,.15)}
.product-img{position:relative;height:200px;overflow:hidden;background:var(--surface2)}
.product-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.product-card:hover .product-img img{transform:scale(1.06)}
.badge{position:absolute;top:.7rem;right:.7rem;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:.7rem;font-weight:700;padding:.18rem .65rem;border-radius:var(--rp)}
.discount-tag{position:absolute;top:.7rem;left:.7rem;background:rgba(239,68,68,.9);color:#fff;font-size:.7rem;font-weight:700;padding:.18rem .65rem;border-radius:var(--rp)}
.out-of-stock{position:absolute;inset:0;background:rgba(2,5,16,.7);display:flex;align-items:center;justify-content:center}
.out-of-stock span{background:rgba(239,68,68,.9);color:#fff;font-size:.82rem;font-weight:700;padding:.4rem 1rem;border-radius:var(--rp)}
.product-body{padding:1.1rem}
.product-cat{font-size:.7rem;color:var(--cyan2);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem}
.product-name{font-size:.95rem;font-weight:700;margin-bottom:.55rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stars-row{display:flex;align-items:center;gap:.35rem;margin-bottom:.7rem}
.stars{color:var(--gold);font-size:.82rem}
.rev{font-size:.75rem;color:var(--muted)}
.price-row{display:flex;align-items:center;justify-content:space-between;gap:.4rem}
.price{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--blue2),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.orig{font-size:.78rem;color:var(--muted);text-decoration:line-through}
.cart-btn{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border-radius:var(--rp);padding:.45rem 1rem;font-size:.8rem;font-weight:700;transition:all var(--ease)}
.cart-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(124,58,237,.5)}
.cart-btn.added{background:linear-gradient(135deg,var(--green),#059669)}
.no-results{text-align:center;padding:4rem 2rem;color:var(--muted)}
.no-results .icon{font-size:3rem;margin-bottom:1rem}
.toast{position:fixed;bottom:2rem;right:2rem;z-index:999;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:.9rem 1.4rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 10px 30px rgba(0,0,0,.5);transform:translateY(80px);opacity:0;transition:all var(--ease);pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:900px){.catalog-layout{grid-template-columns:1fr}.sidebar{position:static;display:grid;grid-template-columns:1fr 1fr;gap:1rem}}
@media(max-width:768px){nav{padding:.9rem 1.2rem}.nav-links{display:none}.hamburger{display:flex}}
@media(max-width:600px){.catalog-layout{padding:0 1rem 4rem}.toolbar{flex-direction:column;align-items:stretch}.sidebar{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-grad"></div>
<nav>
  <a href="index.html" class="nav-logo">NEO PULSE HUB</a>
  <ul class="nav-links">
    <li><a href="index.html">الرئيسية</a></li>
    <li><a href="products.html" class="active">المنتجات</a></li>
    <li><a href="about.html">من نحن</a></li>
    <li><a href="contact.html">اتصل بنا</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:.8rem">
    <button class="nav-cart" onclick="openCart()">🛒 السلة<span class="cart-count" id="cartCount"></span></button>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-drawer" id="mobileDrawer">
  <a href="index.html" onclick="closeMenu()">🏠 الرئيسية</a>
  <a href="products.html" onclick="closeMenu()">🛍️ المنتجات</a>
  <a href="about.html" onclick="closeMenu()">ℹ️ من نحن</a>
  <a href="contact.html" onclick="closeMenu()">📞 اتصل بنا</a>
</div>

<div class="page-header">
  <h1 class="page-title">كل المنتجات</h1>
  <p class="page-sub">اكتشف أحدث منتجات الذكاء الاصطناعي والتقنية الذكية</p>
</div>

<div class="catalog-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title">الفئات</div>
      <button class="filter-btn active" onclick="setFilter('all',this)">🌐 جميع المنتجات <span class="filter-count" id="count-all">15</span></button>
      <button class="filter-btn" onclick="setFilter('smartwatch',this)">⌚ ساعات ذكية <span class="filter-count" id="count-smartwatch">2</span></button>
      <button class="filter-btn" onclick="setFilter('smart-glasses',this)">🥽 نظارات ذكية <span class="filter-count" id="count-smart-glasses">2</span></button>
      <button class="filter-btn" onclick="setFilter('health',this)">❤️ الصحة الذكية <span class="filter-count" id="count-health">3</span></button>
      <button class="filter-btn" onclick="setFilter('smart-home',this)">🏠 المنزل الذكي <span class="filter-count" id="count-smart-home">3</span></button>
      <button class="filter-btn" onclick="setFilter('earbuds',this)">🎧 سماعات <span class="filter-count" id="count-earbuds">1</span></button>
      <button class="filter-btn" onclick="setFilter('productivity',this)">💼 الإنتاجية <span class="filter-count" id="count-productivity">4</span></button>
    </div>
    <div class="sidebar-card">
      <div class="sidebar-title">السعر (دولار)</div>
      <input type="range" class="price-range" id="priceRange" min="0" max="700" value="700" oninput="filterByPrice(this.value)">
      <div class="price-labels"><span>$0</span><span id="priceLabel">$700</span></div>
    </div>
    <div class="sidebar-card">
      <div class="sidebar-title">الفرز</div>
      <button class="filter-btn" onclick="sortProducts('price-asc',this)">💲 الأقل سعراً</button>
      <button class="filter-btn" onclick="sortProducts('price-desc',this)">💎 الأعلى سعراً</button>
      <button class="filter-btn active" onclick="sortProducts('rating',this)">⭐ الأعلى تقييماً</button>
      <button class="filter-btn" onclick="sortProducts('discount',this)">🏷️ الأكبر خصماً</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="ابحث عن منتج..." oninput="applyFilters()">
      </div>
      <span class="results-count" id="resultsCount">15 منتج</span>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </main>
</div>

<div class="toast" id="toast"><span id="toastIcon"></span><span id="toastText"></span></div>

<script>
let allProducts = [], filteredProducts = [];
let activeCategory = 'all', maxPrice = 700, sortBy = 'rating';
let cart = JSON.parse(localStorage.getItem('nph_cart') || '[]');

async function init() {
  // Read URL params
  const params = new URLSearchParams(window.location.search);
  if (params.get('cat')) { activeCategory = params.get('cat'); }

  try {
    const PRODUCTS_URL = 'https://raw.githubusercontent.com/casperblac991/neo-pulse-hub/main/products.json?t=' + Date.now();
    const r = await fetch(PRODUCTS_URL);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    // نظّف SVG base64 إذا موجود
    const cleaned = text.replace(/"image"\s*:\s*"data:image\/svg[^"]*"/g, '"image": ""');
    allProducts = JSON.parse(cleaned);
    // استبدل الصور الفارغة بـ SVG محلي
    allProducts.forEach(p => {
      if (!p.image || p.image === '') {
        p.image = getCategorySVG(p.category);
      }
    });
    console.log('✅ Loaded', allProducts.length, 'products');
  } catch(e) {
    console.error('❌ Error:', e);
    allProducts = getFallbackProducts();
  }
  applyFilters();
  updateCartUI();
  updateCategoryCounts();

  // Activate correct category button
  if (activeCategory !== 'all') {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('active');
      if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(`'${activeCategory}'`)) b.classList.add('active');
    });
  }
}

function updateCategoryCounts() {
  const cats = ['smartwatch','smart-glasses','health','smart-home','earbuds','productivity'];
  cats.forEach(c => {
    const el = document.getElementById('count-' + c);
    if (el) el.textContent = allProducts.filter(p => p.category === c).length;
  });
  const all = document.getElementById('count-all');
  if (all) all.textContent = allProducts.length;
}

function applyFilters() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  filteredProducts = allProducts.filter(p => {
    const matchCat  = activeCategory === 'all' || p.category === activeCategory;
    const matchPrice = p.price <= maxPrice;
    const matchQ = !q || p.name_ar.toLowerCase().includes(q) ||
                   (p.category_ar||'').includes(q) ||
                   (p.tags||[]).some(t=>t.includes(q));
    return matchCat && matchPrice && matchQ;
  });

  // Sort
  if (sortBy === 'price-asc')  filteredProducts.sort((a,b) => a.price - b.price);
  if (sortBy === 'price-desc') filteredProducts.sort((a,b) => b.price - a.price);
  if (sortBy === 'rating')     filteredProducts.sort((a,b) => b.rating - a.rating);
  if (sortBy === 'discount')   filteredProducts.sort((a,b) => b.discount - a.discount);

  renderProducts();
  document.getElementById('resultsCount').textContent = `${filteredProducts.length} منتج`;
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  if (filteredProducts.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><div class="icon">🔍</div><p>لا توجد منتجات مطابقة للبحث</p></div>`;
    return;
  }
  grid.innerHTML = filteredProducts.map((p, i) => {
    const inCart = cart.some(c => c.id === p.id);
    const outOfStock = (p.stock || 99) === 0;
    return `
    <div class="product-card" style="animation-delay:${i*0.04}s" onclick="goProduct('${p.id}')">
      <div class="product-img">
        <img src="${p.image}" alt="${p.name_ar}" loading="lazy" onerror="this.onerror=null;this.src='https://placehold.co/400x400/1e3a5f/ffffff?text='+encodeURIComponent(p.name_ar||'Product')">
        ${(p.badge?.ar||p.badge) ? `<span class="badge">${p.badge?.ar||p.badge}</span>` : ''}
        ${p.discount ? `<span class="discount-tag">-${p.discount}%</span>` : ''}
        ${outOfStock ? `<div class="out-of-stock"><span>نفد المخزون</span></div>` : ''}
      </div>
      <div class="product-body">
        <div class="product-cat">${lang==="en" ? (p.category_en||p.category_ar||"") : (p.category_ar||"")}</div>
        <div class="product-name">${p.name?.[lang] || p.name_ar || p.name_en || ""}</div>
        <div class="stars-row">
          <span class="stars">${'★'.repeat(Math.floor(p.rating||4))}</span>
          <span class="rev">${p.rating} (${p.reviews||0})</span>
        </div>
        <div class="price-row">
          <div>
            <div class="price">$${p.price}</div>
            ${p.original_price ? `<div class="orig">$${p.original_price}</div>` : ''}
          </div>
          ${!outOfStock ? `<button class="cart-btn ${inCart?'added':''}" onclick="addToCart(event,'${p.id}')">${inCart?'✅ أُضيف':'🛒 أضف'}</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.sidebar .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function sortProducts(by, btn) {
  sortBy = by;
  document.querySelectorAll('.sidebar-card:last-child .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterByPrice(val) {
  maxPrice = parseInt(val);
  document.getElementById('priceLabel').textContent = '$' + val;
  applyFilters();
}

function addToCart(e, id) {
  e.stopPropagation();
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const ex = cart.find(c => c.id === id);
  if (ex) ex.qty = (ex.qty||1) + 1;
  else cart.push({...p, qty:1});
  localStorage.setItem('nph_cart', JSON.stringify(cart));
  updateCartUI(); renderProducts();
  showToast('✅', `${p.name_ar} أُضيف للسلة`);
}

function updateCartUI() {
  const total = cart.reduce((s,i) => s + (i.qty||1), 0);
  const badge = document.getElementById('cartCount');
  if (badge) { badge.textContent = total; badge.style.display = total > 0 ? 'flex' : 'none'; }
}

function openCart() {
  if (!cart.length) { showToast('🛒','سلتك فارغة!'); return; }
  const items = cart.map(i=>`• ${i.name_ar} x${i.qty||1} = $${(i.price*(i.qty||1)).toFixed(2)}`).join('\n');
  const total = cart.reduce((s,i) => s+i.price*(i.qty||1), 0);
  alert(`🛒 السلة:\n\n${items}\n\n💰 الإجمالي: $${total.toFixed(2)}`);
}

function goProduct(id) { window.location.href = `product-detail.html?id=${id}`; }

let toastTimer;
function showToast(icon, text) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon + ' ';
  document.getElementById('toastText').textContent = text;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function toggleMenu() {
  const h = document.getElementById('hamburger'), d = document.getElementById('mobileDrawer');
  h.classList.toggle('open'); d.classList.toggle('open');
  document.body.style.overflow = d.classList.contains('open') ? 'hidden' : '';
}
function closeMenu() {
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('mobileDrawer').classList.remove('open');
  document.body.style.overflow = '';
}

function getFallbackProducts() { return []; }

  const svgs = {

async function loadProductImage(imgEl, productName, category) {
  // أولاً: جرب Google Custom Search
  if (productName) {
    try {
      const q = encodeURIComponent(productName + " smartwatch earbuds product photo -site:pinterest.com");
      const url = `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${GOOGLE_CX}&searchType=image&q=${q}&num=5&imgSize=medium&imgType=photo`;
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();
        const items = (data.items || []);
        for (const item of items) {
          const link = item.link || "";
          // تحقق من أن الرابط صورة حقيقية
          if (link && link.startsWith("http") && 
              (link.includes(".jpg") || link.includes(".jpeg") || link.includes(".png") || link.includes(".webp"))) {
            imgEl.src = link;
            imgEl.onerror = () => setPlaceholder(imgEl, category);
            return;
          }
        }
        // إذا ما لقينا jpg مباشر، خذ أول نتيجة
        if (items[0]?.link) {
          imgEl.src = items[0].link;
          imgEl.onerror = () => setPlaceholder(imgEl, category);
          return;
        }
      }
    } catch(e) { /* fallback */ }
  }
  // ثانياً: SVG احترافي
  setPlaceholder(imgEl, category);
}

async function fetchGoogleImage(imgEl, productName, category) {
  if (!productName) return setPlaceholder(imgEl, category);
  
  // تحقق من الكاش
  if (imgCache[productName]) {
    imgEl.src = imgCache[productName];
    return;
  }

  try {
    const q = encodeURIComponent(productName + " product");
    const url = `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${GOOGLE_CX}&searchType=image&q=${q}&num=3&imgSize=large`;
    const res = await fetch(url);
    const data = await res.json();
    const items = data.items || [];
    
    for (const item of items) {
      const link = item.link || "";
      if (link && (link.endsWith(".jpg") || link.endsWith(".jpeg") || link.endsWith(".png") || link.endsWith(".webp") || link.includes("image"))) {
        imgCache[productName] = link;
        imgEl.src = link;
        imgEl.onerror = () => setPlaceholder(imgEl, category);
        return;
      }
    }
    
    // أول نتيجة إذا ما لقينا
    if (items[0]?.link) {
      imgCache[productName] = items[0].link;
      imgEl.src = items[0].link;
      imgEl.onerror = () => setPlaceholder(imgEl, category);
      return;
    }
  } catch(e) {
    console.log("Google image error:", e);
  }
  
  setPlaceholder(imgEl, category);
}
