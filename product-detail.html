<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEO PULSE HUB | تفاصيل المنتج</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Poppins:wght@300;400;500;600;700;900&family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    /* نفس الـ CSS من index.html - أضفه هنا كاملاً */
    :root {
      --bg: #020510;
      --surface: #0a0d1a;
      --surface2: #0f1423;
      --border: rgba(99,179,237,.12);
      --border2: rgba(99,179,237,.25);
      --blue: #3b82f6;
      --blue2: #60a5fa;
      --purple: #7c3aed;
      --purple2: #a855f7;
      --cyan: #06b6d4;
      --cyan2: #22d3ee;
      --green: #10b981;
      --red: #ef4444;
      --gold: #f59e0b;
      --text: #e2e8f0;
      --muted: rgba(226,232,240,.55);
      --r: 12px;
      --r2: 20px;
      --rp: 50px;
      --ease: .3s cubic-bezier(.4,0,.2,1);
      --glow-b: 0 0 30px rgba(59,130,246,.35);
      --glow-p: 0 0 30px rgba(124,58,237,.35);
      --glow-c: 0 0 30px rgba(6,182,212,.35);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: -3;
      background-image: linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .bg-grad {
      position: fixed; inset: 0; z-index: -2;
      background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,58,237,.12), transparent 60%),
                  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,.08), transparent 60%);
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: .9rem 2.5rem; background: rgba(2,5,16,.85);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(135deg, var(--blue2), var(--cyan2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 1rem; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none; padding: .35rem .8rem;
      border-radius: 50px; transition: all var(--ease);
    }
    .nav-links a:hover, .nav-links a.active { color: var(--cyan2); background: rgba(6,182,212,.08); }
    .lang-switch { display: flex; gap: 5px; margin: 0 10px; }
    .lang-btn {
      background: rgba(59,130,246,.1); border: 1px solid var(--border2);
      color: var(--text); padding: .25rem .8rem; border-radius: var(--rp);
      font-size: .8rem; cursor: pointer;
    }
    .lang-btn.active { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; }
    .product-detail {
      padding: 120px 2rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .product-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
    }
    .product-gallery img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border2);
    }
    .product-info h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff, var(--blue2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .product-meta {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      color: var(--muted);
    }
    .product-price {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--blue2), var(--cyan2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    .product-original {
      font-size: 1.2rem;
      color: var(--muted);
      text-decoration: line-through;
      margin-right: 1rem;
    }
    .product-description {
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    .product-actions {
      display: flex;
      gap: 1rem;
    }
    .btn {
      padding: .85rem 2rem;
      border-radius: var(--rp);
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff;
    }
    .btn-outline {
      background: rgba(6,182,212,.08);
      border: 1px solid rgba(6,182,212,.4);
      color: var(--cyan2);
    }
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 1rem 1.5rem;
      display: flex; align-items: center; gap: .75rem;
      transform: translateY(100px); opacity: 0;
      transition: all var(--ease);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    @media (max-width: 768px) {
      .product-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-grad"></div>

<nav>
  <a href="index.html" class="nav-logo">NEO PULSE HUB</a>
  <ul class="nav-links">
    <li><a href="index.html">الرئيسية</a></li>
    <li><a href="products.html" class="active">المنتجات</a></li>
    <li><a href="about.html">من نحن</a></li>
    <li><a href="contact.html">اتصل بنا</a></li>
  </ul>
  <div style="display: flex; align-items: center; gap: 1rem;">
    <div class="lang-switch">
      <button class="lang-btn active" onclick="changeLang('ar')">العربية</button>
      <button class="lang-btn" onclick="changeLang('en')">English</button>
    </div>
  </div>
</nav>

<div class="product-detail">
  <div class="product-container" id="productContainer">
    <!-- يتم التعبئة بواسطة JavaScript -->
    <div style="grid-column: 1/-1; text-align: center; padding: 4rem;">
      جاري تحميل المنتج...
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon">✅</span>
  <span class="toast-text" id="toastText"></span>
</div>

<script>
let currentLang = localStorage.getItem('lang') || 'ar';
let allProducts = [];
let cart = JSON.parse(localStorage.getItem('nph_cart') || '[]');

const translations = {
  ar: {
    add_to_cart: '🛒 أضف إلى السلة',
    back: '← رجوع',
    category: 'التصنيف',
    sku: 'رمز المنتج',
    in_stock: 'متوفر',
    out_of_stock: 'غير متوفر',
    added: '✅ أُضيف'
  },
  en: {
    add_to_cart: '🛒 Add to Cart',
    back: '← Back',
    category: 'Category',
    sku: 'SKU',
    in_stock: 'In Stock',
    out_of_stock: 'Out of Stock',
    added: '✅ Added'
  }
};

async function loadProduct() {
  const urlParams = new URLSearchParams(window.location.search);
  const productId = urlParams.get('id');
  
  if (!productId) {
    window.location.href = 'products.html';
    return;
  }

  try {
    const response = await fetch('products.json');
    allProducts = await response.json();
    const product = allProducts.find(p => p.id === productId);
    
    if (product) {
      renderProduct(product);
    } else {
      document.getElementById('productContainer').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:4rem;">المنتج غير موجود</div>';
    }
  } catch (error) {
    console.error('Error loading product:', error);
  }
}

function renderProduct(product) {
  const container = document.getElementById('productContainer');
  const inCart = cart.some(c => c.id === product.id);
  const name = product.name[currentLang];
  const category = currentLang === 'ar' ? product.category_ar : product.category_en;
  const description = product.description[currentLang];
  
  container.innerHTML = `
    <div class="product-gallery">
      <img src="${product.image}" alt="${name}">
    </div>
    <div class="product-info">
      <h1>${name}</h1>
      <div class="product-meta">
        <span>${translations[currentLang].category}: ${category}</span>
        <span>${translations[currentLang].sku}: ${product.id}</span>
        <span>${product.in_stock ? translations[currentLang].in_stock : translations[currentLang].out_of_stock}</span>
      </div>
      <div>
        <span class="product-price">$${product.price}</span>
        ${product.original_price ? `<span class="product-original">$${product.original_price}</span>` : ''}
      </div>
      <div class="product-description">
        ${description}
      </div>
      <div class="product-actions">
        <button class="btn btn-primary" onclick="addToCart('${product.id}')">
          ${inCart ? translations[currentLang].added : translations[currentLang].add_to_cart}
        </button>
        <button class="btn btn-outline" onclick="window.location.href='products.html'">
          ${translations[currentLang].back}
        </button>
      </div>
    </div>
  `;
}

function addToCart(productId) {
  const product = allProducts.find(p => p.id === productId);
  if (!product) return;
  
  const existing = cart.find(c => c.id === productId);
  if (existing) {
    existing.qty = (existing.qty || 1) + 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  
  localStorage.setItem('nph_cart', JSON.stringify(cart));
  
  const name = product.name[currentLang];
  showToast('✅', currentLang === 'ar' ? `${name} أُضيف للسلة!` : `${name} added to cart!`);
  renderProduct(product);
}

function showToast(icon, text) {
  const toast = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastText').textContent = text;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function changeLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(lang === 'ar' ? 'العربية' : 'English'));
  });
  
  loadProduct();
}

window.addEventListener('load', loadProduct);
</script>
</body>
</html>
