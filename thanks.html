<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شكراً لطلبك | NEO PULSE HUB</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#020510;--surface:#0a0d1a;--border:rgba(99,179,237,.15);--border2:rgba(99,179,237,.3);--blue:#3b82f6;--blue2:#60a5fa;--purple:#7c3aed;--cyan2:#22d3ee;--green:#10b981;--text:#e2e8f0;--muted:rgba(226,232,240,.55);--r:12px;--r2:20px;--rp:50px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
    .bg-grid{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:60px 60px}
    .bg-grad{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(16,185,129,.1),transparent 60%)}
    /* Success Animation */
    .success-circle{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--green),#059669);display:flex;align-items:center;justify-content:center;font-size:3rem;margin:0 auto 1.5rem;box-shadow:0 0 40px rgba(16,185,129,.4);animation:pop .6s cubic-bezier(.175,.885,.32,1.275)}
    @keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
    .card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:2.5rem;max-width:520px;width:100%;animation:fadeUp .5s ease .2s both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .brand{font-family:'Orbitron',sans-serif;font-size:.9rem;background:linear-gradient(135deg,var(--blue2),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.5rem}
    .title{font-family:'Orbitron',sans-serif;font-size:clamp(1.3rem,3vw,1.8rem);font-weight:900;color:#fff;margin-bottom:.5rem}
    .sub{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
    /* Order Details */
    .order-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem;text-align:right}
    html[dir="ltr"] .order-box{text-align:left}
    .order-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.9rem}
    .order-row:last-child{border:none;padding-top:.8rem;margin-top:.4rem}
    .order-label{color:var(--muted)}
    .order-val{font-weight:700;color:var(--text)}
    .order-val.price{font-family:'Orbitron',sans-serif;color:var(--green);font-size:1.1rem}
    .order-val.id{font-family:monospace;color:var(--cyan2);font-size:.85rem}
    /* Steps */
    .steps{display:flex;gap:1rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
    .step{display:flex;flex-direction:column;align-items:center;gap:.3rem;flex:1;min-width:80px}
    .step-icon{width:44px;height:44px;border-radius:50%;background:rgba(59,130,246,.1);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:.2rem}
    .step-label{font-size:.72rem;color:var(--muted)}
    .step-arrow{color:var(--muted);font-size:1rem;align-self:center;margin-top:-1rem}
    /* Buttons */
    .btns{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:.8rem 1.5rem;border-radius:var(--rp);font-weight:700;font-size:.9rem;font-family:'Cairo',sans-serif;transition:all .3s;cursor:pointer;border:none;text-decoration:none}
    .btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(59,130,246,.4)}
    .btn-outline{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.3);color:var(--cyan2)}
    .btn-outline:hover{background:rgba(6,182,212,.12);transform:translateY(-2px)}
    .tg-box{background:rgba(0,136,204,.08);border:1px solid rgba(0,136,204,.2);border-radius:var(--r);padding:1rem;margin-top:1.2rem;display:flex;align-items:center;gap:.8rem}
    .tg-box p{font-size:.82rem;color:var(--muted);text-align:right}
    html[dir="ltr"] .tg-box p{text-align:left}
    .tg-box a{color:var(--cyan2);font-weight:700;white-space:nowrap}
    /* Confetti */
    .confetti{position:fixed;inset:0;pointer-events:none;z-index:10;overflow:hidden}
    .c{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear both}
    @keyframes fall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(100vh) rotate(720deg);opacity:0}}
  </style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-grad"></div>
<div class="confetti" id="confetti"></div>

<div class="brand">NEO PULSE HUB</div>

<div class="success-circle">✅</div>

<div class="card">
  <h1 class="title" id="mainTitle">شكراً لطلبك!</h1>
  <p class="sub" id="mainSub">تم استلام طلبك بنجاح وسيتم معالجته قريباً</p>

  <!-- تفاصيل الطلب -->
  <div class="order-box" id="orderBox">
    <div class="order-row">
      <span class="order-label" id="lbl_orderid">رقم الطلب</span>
      <span class="order-val id" id="orderNum">—</span>
    </div>
    <div class="order-row" id="productRow" style="display:none">
      <span class="order-label" id="lbl_product">المنتج</span>
      <span class="order-val" id="productName">—</span>
    </div>
    <div class="order-row" id="qtyRow" style="display:none">
      <span class="order-label" id="lbl_qty">الكمية</span>
      <span class="order-val" id="orderQty">—</span>
    </div>
    <div class="order-row">
      <span class="order-label" id="lbl_status">الحالة</span>
      <span class="order-val" style="color:var(--green)" id="orderStatus">✅ مؤكد</span>
    </div>
    <div class="order-row" id="totalRow" style="display:none">
      <span class="order-label" id="lbl_total">المبلغ المدفوع</span>
      <span class="order-val price" id="totalPaid">—</span>
    </div>
  </div>

  <!-- خطوات التوصيل -->
  <div class="steps">
    <div class="step">
      <div class="step-icon">✅</div>
      <div class="step-label" id="step1">تأكيد الطلب</div>
    </div>
    <div class="step-arrow">→</div>
    <div class="step">
      <div class="step-icon">📦</div>
      <div class="step-label" id="step2">التحضير</div>
    </div>
    <div class="step-arrow">→</div>
    <div class="step">
      <div class="step-icon">🚚</div>
      <div class="step-label" id="step3">الشحن</div>
    </div>
    <div class="step-arrow">→</div>
    <div class="step">
      <div class="step-icon">🏠</div>
      <div class="step-label" id="step4">التسليم</div>
    </div>
  </div>

  <!-- أزرار -->
  <div class="btns">
    <a href="products.html" class="btn btn-primary" id="btn_shop">🛍️ مواصلة التسوق</a>
    <a href="index.html" class="btn btn-outline" id="btn_home">🏠 الرئيسية</a>
  </div>

  <!-- تيليجرام -->
  <div class="tg-box">
    <span style="font-size:1.5rem">✈️</span>
    <p id="tg_text">لمتابعة طلبك أو لأي استفسار، تواصل مع <a href="https://t.me/NeoPulseBot" target="_blank">@NeoPulseBot</a> على تيليجرام</p>
  </div>
</div>

<script>
const T = {
  ar: {
    title:'شكراً لطلبك!', sub:'تم استلام طلبك بنجاح وسيتم معالجته قريباً',
    lbl_orderid:'رقم الطلب', lbl_product:'المنتج', lbl_qty:'الكمية',
    lbl_status:'الحالة', lbl_total:'المبلغ المدفوع', orderStatus:'✅ مؤكد',
    step1:'تأكيد الطلب', step2:'التحضير', step3:'الشحن', step4:'التسليم',
    btn_shop:'🛍️ مواصلة التسوق', btn_home:'🏠 الرئيسية',
    tg_text:'لمتابعة طلبك أو لأي استفسار، تواصل مع @NeoPulseBot على تيليجرام',
    doc_title:'شكراً لطلبك | NEO PULSE HUB',
  },
  en: {
    title:'Thank You for Your Order!', sub:'Your order has been received and will be processed shortly',
    lbl_orderid:'Order Number', lbl_product:'Product', lbl_qty:'Quantity',
    lbl_status:'Status', lbl_total:'Amount Paid', orderStatus:'✅ Confirmed',
    step1:'Order Confirmed', step2:'Preparing', step3:'Shipping', step4:'Delivery',
    btn_shop:'🛍️ Continue Shopping', btn_home:'🏠 Home',
    tg_text:'To track your order or for any inquiry, contact @NeoPulseBot on Telegram',
    doc_title:'Thank You | NEO PULSE HUB',
  }
};

const lang = localStorage.getItem('nph_lang') || 'ar';
const t = T[lang];

// تطبيق اللغة
document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
document.documentElement.setAttribute('lang', lang);
document.title = t.doc_title;
Object.keys(t).forEach(id => {
  const el = document.getElementById(id);
  if (el) el.textContent = t[id];
});

// قراءة الـ parameters من URL
const params = new URLSearchParams(window.location.search);
const orderId = params.get('id') || params.get('order');
const total = params.get('total');
const qty = params.get('qty') || '1';

// رقم الطلب
const orderNum = orderId
  ? `${orderId}-${Date.now().toString(36).toUpperCase().slice(-4)}`
  : `NPH-${Date.now().toString(36).toUpperCase().slice(-6)}`;
document.getElementById('orderNum').textContent = orderNum;

// المبلغ
if (total) {
  document.getElementById('totalPaid').textContent = `$${parseFloat(total).toFixed(2)}`;
  document.getElementById('totalRow').style.display = 'flex';
}

// الكمية
if (qty && parseInt(qty) > 0) {
  document.getElementById('orderQty').textContent = qty;
  document.getElementById('qtyRow').style.display = 'flex';
}

// جلب اسم المنتج إذا في id
if (orderId) {
  fetch('https://raw.githubusercontent.com/casperblac991/neo-pulse-hub/main/products.json')
    .then(r => r.json())
    .then(products => {
      const p = products.find(x => x.id === orderId);
      if (p) {
        const name = lang === 'en' ? (p.name_en || p.name_ar) : p.name_ar;
        document.getElementById('productName').textContent = name;
        document.getElementById('productRow').style.display = 'flex';
      }
    })
    .catch(() => {});
}

// مسح السلة بعد الشراء
localStorage.removeItem('nph_cart');

// Confetti 🎉
function spawnConfetti() {
  const colors = ['#3b82f6','#7c3aed','#10b981','#f59e0b','#22d3ee','#ef4444'];
  const container = document.getElementById('confetti');
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'c';
    c.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${4+Math.random()*8}px;
      height:${4+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.8}s;
    `;
    container.appendChild(c);
  }
  setTimeout(() => container.innerHTML = '', 4000);
}
spawnConfetti();

// حفظ الطلب في localStorage للمتابعة
const order = {
  id: orderNum,
  productId: orderId,
  qty: parseInt(qty),
  total: total ? parseFloat(total) : null,
  date: new Date().toISOString(),
  status: 'confirmed'
};
const orders = JSON.parse(localStorage.getItem('nph_orders') || '[]');
orders.unshift(order);
localStorage.setItem('nph_orders', JSON.stringify(orders.slice(0, 20)));
</script>
</body>
</html>
