<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>(function(){var l=localStorage.getItem('nph_lang')||'ar';document.documentElement.setAttribute('lang',l);document.documentElement.setAttribute('dir',l==='en'?'ltr':'rtl');})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — الصفحة غير موجودة | NEO PULSE HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#020510;--surface:#0a0d1a;--border:rgba(99,179,237,.12);--border2:rgba(99,179,237,.25);--blue:#3b82f6;--blue2:#60a5fa;--purple:#7c3aed;--cyan2:#22d3ee;--text:#e2e8f0;--muted:rgba(226,232,240,.55);--rp:50px;--ease:.3s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
a{color:inherit;text-decoration:none}
.bg-grid{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:60px 60px}
.glow{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(59,130,246,.15),transparent)}
.container{text-align:center;padding:2rem;max-width:600px}
.code{font-family:'Orbitron',sans-serif;font-size:clamp(6rem,20vw,10rem);font-weight:900;line-height:1;background:linear-gradient(135deg,var(--blue2),var(--cyan2),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:flicker 3s infinite}
@keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:.8}97%{opacity:1}98%{opacity:.6}99%{opacity:1}}
.glitch{position:relative;display:inline-block}
.glitch::before,.glitch::after{content:attr(data-text);position:absolute;inset:0;background:linear-gradient(135deg,var(--blue2),var(--cyan2),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.glitch::before{animation:glitch1 4s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%)}
.glitch::after{animation:glitch2 4s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%)}
@keyframes glitch1{0%,90%,100%{transform:translateX(0)}91%{transform:translateX(-4px)}92%{transform:translateX(4px)}93%{transform:translateX(0)}}
@keyframes glitch2{0%,90%,100%{transform:translateX(0)}91%{transform:translateX(4px)}92%{transform:translateX(-4px)}93%{transform:translateX(0)}}
.title{font-family:'Orbitron',sans-serif;font-size:clamp(1.1rem,3vw,1.6rem);font-weight:700;margin:1rem 0 .5rem;letter-spacing:.05em}
.sub{color:var(--muted);font-size:.95rem;margin-bottom:2.5rem;line-height:1.8}
.btn-row{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap}
.btn{padding:.75rem 1.8rem;border-radius:var(--rp);font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:700;transition:all var(--ease);cursor:pointer;border:none}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
.btn-primary:hover{opacity:.85;transform:translateY(-2px)}
.btn-outline{border:1px solid var(--border2);color:var(--blue2);background:rgba(59,130,246,.06)}
.btn-outline:hover{background:rgba(59,130,246,.15)}
.suggestions{margin-top:3rem;display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap}
.sugg-link{font-size:.82rem;color:var(--muted);background:rgba(99,179,237,.06);border:1px solid var(--border);border-radius:var(--rp);padding:.25rem .8rem;transition:all var(--ease)}
.sugg-link:hover{color:var(--cyan2);border-color:var(--border2)}
.lang-float{position:fixed;top:1rem;right:1rem;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--rp);overflow:hidden;z-index:10}
.lang-btn{padding:.3rem .8rem;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;font-family:'Cairo',sans-serif;transition:all var(--ease)}
.lang-btn.active{background:var(--blue);color:#fff}
.particles{position:fixed;inset:0;z-index:-1;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;background:var(--blue2);border-radius:50%;opacity:.4;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.4}90%{opacity:.4}100%{transform:translateY(-100px) translateX(var(--dx));opacity:0}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="particles" id="particles"></div>

<div class="lang-float">
  <button class="lang-btn active" id="langAr" onclick="changeLang('ar')">عربي</button>
  <button class="lang-btn" id="langEn" onclick="changeLang('en')">EN</button>
</div>

<div class="container">
  <div class="code">
    <span class="glitch" data-text="404">404</span>
  </div>
  <h1 class="title" id="err_title">الصفحة غير موجودة</h1>
  <p class="sub" id="err_sub">يبدو أن هذه الصفحة اختفت في الفضاء الرقمي.<br>لكن لا تقلق — هناك الكثير لاستكشافه!</p>
  <div class="btn-row">
    <a href="index.html" class="btn btn-primary" id="btn_home">&#x1F3E0; الرئيسية</a>
    <a href="products.html" class="btn btn-outline" id="btn_products">&#x1F6CD; المنتجات</a>
  </div>
  <div class="suggestions">
    <a href="about.html" class="sugg-link" id="s_about">من نحن</a>
    <a href="contact.html" class="sugg-link" id="s_contact">اتصل بنا</a>
    <a href="blog.html" class="sugg-link" id="s_blog">المدونة</a>
    <a href="faq.html" class="sugg-link" id="s_faq">FAQ</a>
    <a href="track.html" class="sugg-link" id="s_track">تتبع الطلب</a>
  </div>
</div>

<script>
var T = {
  ar: {
    err_title: 'الصفحة غير موجودة',
    err_sub: 'يبدو أن هذه الصفحة اختفت في الفضاء الرقمي.\nلكن لا تقلق — هناك الكثير لاستكشافه!',
    btn_home: 'الرئيسية',
    btn_products: 'المنتجات',
    s_about: 'من نحن', s_contact: 'اتصل بنا',
    s_blog: 'المدونة', s_faq: 'FAQ', s_track: 'تتبع الطلب'
  },
  en: {
    err_title: 'Page Not Found',
    err_sub: 'Looks like this page drifted into the digital void.\nBut don\'t worry — there\'s plenty left to explore!',
    btn_home: 'Home',
    btn_products: 'Products',
    s_about: 'About', s_contact: 'Contact',
    s_blog: 'Blog', s_faq: 'FAQ', s_track: 'Track Order'
  }
};

function changeLang(l) {
  try { localStorage.setItem('nph_lang', l); } catch(e) {}
  document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
  document.documentElement.setAttribute('lang', l);
  var arBtn = document.getElementById('langAr');
  var enBtn = document.getElementById('langEn');
  if (arBtn) arBtn.className = 'lang-btn' + (l === 'ar' ? ' active' : '');
  if (enBtn) enBtn.className = 'lang-btn' + (l === 'en' ? ' active' : '');
  var keys = Object.keys(T[l]);
  for (var i = 0; i < keys.length; i++) {
    var el = document.getElementById(keys[i]);
    if (!el) continue;
    if (keys[i] === 'err_sub') {
      el.innerHTML = T[l][keys[i]].replace(/\n/g, '<br>');
    } else {
      el.textContent = T[l][keys[i]];
    }
  }
}

// Particles
var p = document.getElementById('particles');
for (var i = 0; i < 25; i++) {
  var d = document.createElement('div');
  d.className = 'particle';
  var x = Math.random() * 100;
  var dur = 8 + Math.random() * 12;
  var delay = -Math.random() * dur;
  var dx = (Math.random() - .5) * 200;
  d.style.cssText = 'left:' + x + '%;animation-duration:' + dur + 's;animation-delay:' + delay + 's;--dx:' + dx + 'px';
  p.appendChild(d);
}

window.onload = function() {
  var l = '';
  try { l = localStorage.getItem('nph_lang') || 'ar'; } catch(e) { l = 'ar'; }
  changeLang(l);
};
</script>
</body>
</html>
