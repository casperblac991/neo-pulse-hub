<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review</title>

<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.hero{background:linear-gradient(90deg,#0b0f1a,#1a2a4f);padding:40px;border-radius:20px}
.title{font-size:26px;font-weight:bold}
.rating{color:gold;margin-top:10px}
.btn{background:#ff9900;padding:12px 20px;border-radius:10px;display:inline-block;margin-top:15px;color:#000;text-decoration:none}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px}
.flex{display:flex;gap:10px;flex-wrap:wrap}
.box{flex:1;padding:15px;border-radius:12px;background:#111827}
.good{border:1px solid green}
.bad{border:1px solid red}
</style>

</head>

<body>

<div class="container">

<div class="hero">
<div class="title">Sony WH-1000XM5: ملك إلغاء الضوضاء</div>
<div class="rating">⭐⭐⭐⭐⭐ 4.8/5</div>
</div>

<a href="#" class="btn">🛒 اشتر الآن</a>

<div class="card">
أفضل سماعة بعد تجربة طويلة.
</div>

<div class="flex">

<div class="box good">
<b>✔ المميزات</b>
<ul>
<li>أفضل ANC</li>
<li>بطارية قوية</li>
<li>صوت ممتاز</li>
</ul>
</div>

<div class="box bad">
<b>❌ العيوب</b>
<ul>
<li>سعر مرتفع</li>
<li>تصميم عادي</li>
</ul>
</div>

</div>

<div class="card">
<h3>الخلاصة</h3>
أفضل خيار في 2026.
</div>

</div>

</body>
</html>
